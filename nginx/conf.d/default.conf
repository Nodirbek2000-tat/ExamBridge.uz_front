# ─────────────────────────────────────────────────────────────────────────────
# HTTP — exambridge.uz  →  redirect to HTTPS + certbot challenge
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name exambridge.uz www.exambridge.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://exambridge.uz$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTP — nodir.exambridge.uz  →  redirect to HTTPS + certbot challenge
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name nodir.exambridge.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTPS — exambridge.uz  →  React SPA
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name exambridge.uz www.exambridge.uz;

    ssl_certificate     /etc/letsencrypt/live/exambridge.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/exambridge.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # www → non-www canonical redirect
    if ($host = www.exambridge.uz) {
        return 301 https://exambridge.uz$request_uri;
    }

    root  /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/xml image/svg+xml;

    # React SPA — client-side routing
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store";
    }

    # Static assets — cache aggressively (Vite adds content hash to filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── API calls (relative /api/) → Django backend ───────────────────────────
    # resolver + set $backend: nginx DNS-ni request vaqtida hal qiladi,
    # backend ishlamasa ham nginx ishga tushadi (startup crash bo'lmaydi)
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://web:8000;
        proxy_pass         $backend;
        proxy_set_header   Host              nodir.exambridge.uz;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Connection        "";
        proxy_http_version 1.1;
        client_max_body_size 100M;
        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }

    # ── Media files → Django backend ─────────────────────────────────────────
    location /media/ {
        resolver 127.0.0.11 valid=30s;
        set $backend http://web:8000;
        proxy_pass         $backend;
        proxy_set_header   Host              nodir.exambridge.uz;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_http_version 1.1;
        expires 7d;
    }
}

# ─────────────────────────────────────────────────────────────────────────────
# HTTPS — nodir.exambridge.uz  →  Django admin panel + full API
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name nodir.exambridge.uz;

    ssl_certificate     /etc/letsencrypt/live/nodir.exambridge.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nodir.exambridge.uz/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    client_max_body_size 100M;

    # Proxy everything to Django
    location / {
        resolver 127.0.0.11 valid=30s;
        set $backend http://web:8000;
        proxy_pass         $backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_http_version 1.1;
        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }
}
